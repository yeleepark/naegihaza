<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#fef3e2" />
  <title>RandomGame.zip - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #030617;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    .title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 0.75rem;
    }
    .description {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #fb923c;
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      border: 2px solid #000;
      border-radius: 0.5rem;
      box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .retry-btn:hover {
      background: #f97316;
      box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
      transform: translateY(-2px);
    }
    .retry-btn:active {
      box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🍀</div>
    <div class="title">Offline</div>
    <p class="description" id="desc">
      No internet connection.<br/>Check your network and try again.
    </p>
    <button class="retry-btn" onclick="location.reload()">Retry</button>
  </div>
  <script>
    const lang = navigator.language?.slice(0, 2) || 'en';
    const msgs = {
      ko: { title: '오프라인', desc: '인터넷 연결이 없습니다.<br/>네트워크를 확인하고 다시 시도해주세요.', btn: '다시 시도' },
      zh: { title: '离线', desc: '没有网络连接。<br/>请检查网络后重试。', btn: '重试' },
      es: { title: 'Sin conexion', desc: 'No hay conexion a Internet.<br/>Verifica tu red e intenta de nuevo.', btn: 'Reintentar' },
    };
    const m = msgs[lang];
    if (m) {
      document.querySelector('.title').textContent = m.title;
      document.getElementById('desc').innerHTML = m.desc;
      document.querySelector('.retry-btn').textContent = m.btn;
    }
  </script>
</body>
</html>
